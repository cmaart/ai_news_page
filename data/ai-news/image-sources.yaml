# Bild-Whitelist (PLAN.md E44, revidiert): kuratierte, manuell geprüfte
# Pressefoto-Einträge — die Pipeline wählt Bilder deterministisch aus dieser
# Liste, ohne LLM-Bildsuche. Jeder Eintrag wurde einmalig von einem Menschen
# verifiziert: Nutzungsbedingungen gelesen, erlaubender Satz wörtlich als
# termsQuote gesichert, Bild-URL geprüft.
#
# Matching (scripts/ai-news/image.ts): Reihenfolge = Priorität, erster Treffer
# gewinnt — spezifische Einträge (Personen) vor generischen (Institutionen).
# Ein Eintrag passt, wenn ein titleKeyword in Titel/Description des Drafts
# vorkommt ODER eine Draft-Quelle auf einer der sourceDomains liegt; optionale
# topics schränken zusätzlich ein (z. B. Parlamentsfotos nur für politische
# Berichterstattung — so verlangen es die Nutzungsbedingungen).
#
# Neue Einträge: Kandidaten aus Run-Notes/Recherche übernehmen, Terms selbst
# lesen, Zitat + Abrufdatum dokumentieren, dann hier eintragen.
# Bild-Anforderungen: QUERFORMAT (Ratio >= 1,2) und >= 800 px Breite — Hochformat-
# Porträts sprengen den 16:9-Hero; die Pipeline lehnt sie hart ab (image.ts).
