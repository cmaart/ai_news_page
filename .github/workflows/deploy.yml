name: Validate, Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate

      # Liefert origin/base_path für den Build und aktiviert GitHub Pages
      # (Source: GitHub Actions) beim ersten Lauf automatisch.
      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build site
        run: npm run build
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Go-Live-TODO: GA4-Property anlegen und als Repository-Variable setzen.
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
