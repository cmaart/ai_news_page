# AI-News-Research-Pipeline (PLAN.md Entscheidungen 25–36, 39–40).
#
# Alle 30 Minuten: RSS-Fetch → Cluster → Score → Haiku-Triage (mit Volltext-
# Auszügen + Backlog-Carry-over) → max 3 Sonnet-Drafts/Updates pro Run.
# Scheduling kommt von außen (E39): Supabase pg_cron → Edge Function
# trigger-ai-news → workflow_dispatch. Kein schedule:-Trigger mehr — GitHub-Cron
# driftete 1–4 h. Siehe docs/supabase-scheduler.md.
# Auto-Publish: validate + build als Gate, dann Commit direkt auf main.
# Sensitivity high: Artikel auf Branch ai-news/<slug> + PR statt main —
# Frontmatter steht bereits auf status: published, Merge allein publiziert
# (Deploy läuft über den on-push-Trigger von deploy.yml, da der Merge mit
# User-Token gepusht wird).
# Memory (data/ai-news/memory) landet immer auf main — deploy.yml ignoriert
# data/**-only-Pushes; nach Artikel-Pushes wird deploy.yml explizit dispatcht
# (Pushes mit GITHUB_TOKEN triggern keine on-push-Workflows).
name: AI News Research

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run (kein Claude, keine Writes)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: ai-news-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # OAuth-Token aus `claude setup-token` — Abrechnung übers Claude-Abo.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AI_NEWS_MAX_TRIAGE: "8"
      AI_NEWS_MAX_ARTICLES_PER_RUN: "3"
      AI_NEWS_MAX_WEB_SEARCH_PER_DAY: "40"
      AI_NEWS_LOOKBACK_HOURS: "48"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Gleiche npm-Version wie lokal (siehe deploy.yml).
      - name: Pin npm version
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI news pipeline
        run: npm run ai-news:run ${{ inputs.dry_run && '-- --dry-run' || '' }}

      - name: Upload debug artifacts (inbox/clusters)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-work-${{ github.run_id }}
          path: data/ai-news/work/
          retention-days: 7
          if-no-files-found: ignore

      - name: Read run manifest
        id: manifest
        run: |
          M=data/ai-news/work/run-output.json
          echo "action=$(jq -r '.action // "none"' $M)" >> "$GITHUB_OUTPUT"
          echo "published_slugs=$(jq -r '[.articles[]? | select(.sensitive | not) | .slug] | join(", ")' $M)" >> "$GITHUB_OUTPUT"
          echo "has_sensitive=$(jq -r '[.articles[]? | select(.sensitive)] | length > 0' $M)" >> "$GITHUB_OUTPUT"
          echo "sensitive_articles=$(jq -c '[.articles[]? | select(.sensitive)]' $M)" >> "$GITHUB_OUTPUT"

      # Gate vor jedem Push: Cross-Checks + kompletter Astro-Build.
      - name: Validate content
        run: npm run validate

      - name: Build site (smoke test)
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Sensitiv: jeder Artikel auf eigenen Branch + PR (nur Artikel + sein
      # Research-JSON), danach vom main-Working-Tree fernhalten. Notes/Memory
      # bleiben im Working Tree und gehen im nächsten Step auf main.
      - name: Create review PRs (sensitive articles)
        if: steps.manifest.outputs.has_sensitive == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ARTICLES: ${{ steps.manifest.outputs.sensitive_articles }}
        run: |
          gh label create automated --color 5319e7 --force
          gh label create news-research --color 0e8a16 --force
          gh label create needs-review --color d93f0b --force
          echo "$ARTICLES" | jq -c '.[]' | while read -r entry; do
            SLUG=$(echo "$entry" | jq -r '.slug')
            ARTICLE=$(echo "$entry" | jq -r '.articlePath')
            RESEARCH=$(echo "$entry" | jq -r '.researchPath')
            BRANCH="ai-news/${SLUG}"
            git checkout -b "$BRANCH"
            git add "$ARTICLE" "$RESEARCH" || true
            if git commit -m "AI-News-Draft (review): ${SLUG}"; then
              # Auf aktuellen Remote-Stand rebasen: wurde main während des Runs
              # aktualisiert (z. B. Workflow-Datei geändert), lehnt GitHub den
              # Push eines Branches mit veralteter Workflow-Datei sonst ab
              # (GITHUB_TOKEN hat nie workflows-Permission).
              git fetch origin main
              git rebase origin/main
              git push -f -u origin "$BRANCH"
              # Fehler nur schlucken, wenn wirklich schon ein PR offen ist — sonst
              # Job-Fail (sichtbar), statt den Artikel unsichtbar auf dem Branch
              # liegen zu lassen (passiert z. B. bei fehlender Actions-PR-Permission).
              BODY=$(printf '%s\n\n%s' \
                "Automatisch erzeugter Draft mit sensitivity: high — bitte prüfen. Research-JSON: ${RESEARCH}" \
                "**Merge = Publish:** Frontmatter steht bereits auf \`status: published\` inkl. \`publishedAt\` — nach dem Merge deployt der Push auf main automatisch. Bei Ablehnung PR einfach schließen.")
              if ! gh pr create --base main --head "$BRANCH" \
                --title "Review nötig: ${SLUG}" \
                --label automated --label news-research --label needs-review \
                --body "$BODY"; then
                if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')" = "0" ]; then
                  echo "::error::PR-Erstellung fehlgeschlagen für ${SLUG} — Artikel läge sonst unsichtbar auf ${BRANCH}."
                  exit 1
                fi
                echo "PR existiert bereits — Branch aktualisiert."
              fi
            else
              echo "Nichts zu committen für ${SLUG}."
            fi
            git checkout main
          done

      - name: Commit to main (memory, notes, published articles)
        run: |
          git add data/ai-news src/content/articles
          if git diff --cached --quiet; then
            echo "Keine Änderungen zu committen."
            exit 0
          fi
          git commit -m "AI news run: ${{ steps.manifest.outputs.action }}${{ steps.manifest.outputs.published_slugs != '' && format(' ({0})', steps.manifest.outputs.published_slugs) || '' }}"
          git pull --rebase origin main
          git push origin main

      # GITHUB_TOKEN-Pushes triggern deploy.yml nicht — bei publizierten
      # Artikeln explizit dispatchen.
      - name: Trigger deploy
        if: startsWith(steps.manifest.outputs.action, 'published')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
